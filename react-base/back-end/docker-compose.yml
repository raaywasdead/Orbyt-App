services:
  postgres:
    image: postgres:16
    container_name: orbyt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orbyt
      POSTGRES_PASSWORD: orbyt123
      POSTGRES_DB: orbyt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: orbyt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: